name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python lint + type + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest -v

  conformance:
    name: pocketid-mcp-as conformance + contract hosting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        # The editable build hook (hatch_build.py) fetches the pinned
        # contract content from GitHub into contract/ during install.
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Boot server + run upstream conformance harness + drift guard
        # Boots homelab-mcp, clones the pinned conformance harness fresh
        # (pocketid-mcp-as, tag from contract/PINNED.json) and runs it
        # UNPATCHED with --mcp-path /mcp (profile jwt-refresh, scope
        # mcp-only), then verifies the served contract.json deep-equals
        # upstream@pinned. Fails the build on any non-zero exit.
        env:
          RUNNER: ""  # console script is on PATH after `pip install -e .`
        run: bash scripts/conformance-ci.sh

  nix:
    name: Nix build + contract pin sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/determinate-nix-action@v3

      - name: Assert contract pin is in sync
        # Cheap guard (no Nix eval): nix/package.nix must pin the same
        # immutable commit SHA that contract/PINNED.json records as `.ref`,
        # otherwise the Nix build stages different contract content than the
        # pip/CI fetch path. Also rejects a non-SHA (mutable tag) pin.
        run: |
          python3 - <<'PY'
          import json, pathlib, re, sys

          pinned = json.loads(pathlib.Path("contract/PINNED.json").read_text())
          ref = pinned["ref"]

          if not re.fullmatch(r"[0-9a-f]{40}", ref):
              sys.exit(f"contract/PINNED.json ref={ref!r} is not a 40-char commit SHA; "
                       "pin an immutable commit, not a mutable tag")

          pkg = pathlib.Path("nix/package.nix").read_text()
          m = re.search(r'rev\s*=\s*"([^"]+)"', pkg)
          if not m:
              sys.exit('could not find `rev = "..."` in nix/package.nix')
          rev = m.group(1)

          if rev != ref:
              sys.exit(f"contract pin drift: nix/package.nix rev={rev!r} != "
                       f"contract/PINNED.json ref={ref!r}")
          print(f"OK: contract pin in sync at {rev}")
          PY

      - name: Flake check (eval)
        run: nix flake check --no-build --show-trace

      - name: Build package (x86_64-linux)
        # Actually build the derivation (fetches + stages the pinned contract
        # and exercises hatch_build.py's integrity check), not just eval.
        run: nix build .#packages.x86_64-linux.default --show-trace
